services:
  - type: web
    name: proxypharma-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: proxypharma-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: proxypharma-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://proxypharma.vercel.app

databases:
  - name: proxypharma-db
    databaseName: proxypharma
    user: proxy
    plan: free
